unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
set -g mouse on
set -g focus-events on
set -g update-environment "KRB5CCNAME SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID"

bind R source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Status bar
set -g status-style 'bg=default fg=#d4a017'
set -g status-justify centre
set -g status-right '%H:%M %d-%b-%Y'
set -g window-status-style 'fg=#d4a017'
set -g window-status-current-style 'fg=#d4a017 bold'
set -g window-status-separator ' '

# Window numbering
set -g base-index 1
set -g renumber-windows on

# Move windows left/right
bind-key -r < swap-window -t -1 \; previous-window
bind-key -r > swap-window -t +1 \; next-window

# Move current window to position N (hyper+N after prefix)
# hyper includes shift, so 1-9 send their shifted symbols: ! @ # $ % ^ & * (
bind-key M-! swap-window -t 1
bind-key 'M-C-@' swap-window -t 2
bind-key 'M-#' swap-window -t 3
bind-key 'M-$' swap-window -t 4
bind-key M-% swap-window -t 5
bind-key 'M-C-^' swap-window -t 6
bind-key 'M-&' swap-window -t 7
bind-key 'M-*' swap-window -t 8
bind-key 'M-(' swap-window -t 9

# Use vi keys in copy mode
setw -g mode-keys vi

# Enter copy mode with prefix + [
# Start selection with v. tmux-yank handles y and mouse copy.

bind-key -T copy-mode-vi v send-keys -X begin-selection

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'mkdir -p ~/.tmux/plugins && git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'

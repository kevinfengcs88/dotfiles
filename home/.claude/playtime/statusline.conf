# Playtime statusline config.
#
# INNER_STATUSLINE is your *base* statusline command. The playtime wrapper runs
# it, then appends the "⏱ hours played" segment. To switch statuslines, change
# the logic below — the playtime tracker keeps working regardless. It receives
# Claude Code's statusline JSON on stdin, same as any statusline command.
#
# Set INNER_STATUSLINE='' to show ONLY the playtime tracker.
#
# Portable across machines: prefer this box's pinned node, else node on PATH,
# and only use GSD's statusline if it's actually present (so a Mac without GSD
# degrades to a clean playtime-only line instead of erroring).

GSD_SL="$HOME/.claude/hooks/gsd-statusline.js"
NODE_BIN="$HOME/.nvm/versions/node/v22.6.0/bin/node"
[ -x "$NODE_BIN" ] || NODE_BIN="$(command -v node 2>/dev/null)"

if [ -n "$NODE_BIN" ] && [ -f "$GSD_SL" ]; then
  INNER_STATUSLINE="$NODE_BIN $GSD_SL"
else
  INNER_STATUSLINE=''
fi
